<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>V2 量化对冲模拟盘看板</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>V2 量化对冲模拟盘看板</h1>
          <p>只读显示 BTC / ETH / SOL / XAUT 的行情、策略、模拟交易和风控状态</p>
        </div>
        <div class="timestamp" id="updated-at">加载中...</div>
      </header>

      <section class="overview" id="overview" aria-label="全局总览"></section>
      <section class="grid" id="bot-grid" aria-label="机器人状态卡片"></section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
