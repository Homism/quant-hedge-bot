services:
  freqtrade-btc:
    image: freqtradeorg/freqtrade:stable
    container_name: quant-hedge-btc
    restart: unless-stopped
    environment:
      FREQTRADE__DRY_RUN: "true"
      FREQTRADE__EXCHANGE__NAME: ${EXCHANGE_NAME:-binance}
      FREQTRADE__EXCHANGE__KEY: ${FREQTRADE__EXCHANGE__KEY:-}
      FREQTRADE__EXCHANGE__SECRET: ${FREQTRADE__EXCHANGE__SECRET:-}
      FREQTRADE__TELEGRAM__ENABLED: ${FREQTRADE__TELEGRAM__ENABLED:-false}
      FREQTRADE__TELEGRAM__TOKEN: ${FREQTRADE__TELEGRAM__TOKEN:-}
      FREQTRADE__TELEGRAM__CHAT_ID: ${FREQTRADE__TELEGRAM__CHAT_ID:-}
      FREQTRADE__API_SERVER__USERNAME: ${BTC_FREQTRADE__API_SERVER__USERNAME:-freqtrader_btc}
      FREQTRADE__API_SERVER__PASSWORD: ${BTC_FREQTRADE__API_SERVER__PASSWORD:-change-me-btc-local-only}
      FREQTRADE__API_SERVER__JWT_SECRET_KEY: ${BTC_FREQTRADE__API_SERVER__JWT_SECRET_KEY:-change-me-btc-jwt-secret-local-only}
      FREQTRADE__API_SERVER__WS_TOKEN: ${BTC_FREQTRADE__API_SERVER__WS_TOKEN:-change-me-btc-ws-local-only}
      KILL_SWITCH_PATH: /freqtrade/runtime/KILL_SWITCH
      PYTHONPATH: /freqtrade:/freqtrade/user_data/strategies
    volumes:
      - ./configs/btc.dryrun.json:/freqtrade/config.json:ro
      - ./user_data_btc:/freqtrade/user_data
      - ./risk_service:/freqtrade/risk_service:ro
      - ./runtime:/freqtrade/runtime
    ports:
      - "127.0.0.1:8081:8080"
    command: >
      trade
      --config /freqtrade/config.json
      --userdir /freqtrade/user_data
      --strategy BtcHedgeStrategy
      --db-url sqlite:////freqtrade/user_data/tradesv3.dryrun.sqlite
      --logfile /freqtrade/user_data/logs/freqtrade.log

  freqtrade-eth:
    image: freqtradeorg/freqtrade:stable
    container_name: quant-hedge-eth
    restart: unless-stopped
    environment:
      FREQTRADE__DRY_RUN: "true"
      FREQTRADE__EXCHANGE__NAME: ${EXCHANGE_NAME:-binance}
      FREQTRADE__EXCHANGE__KEY: ${FREQTRADE__EXCHANGE__KEY:-}
      FREQTRADE__EXCHANGE__SECRET: ${FREQTRADE__EXCHANGE__SECRET:-}
      FREQTRADE__TELEGRAM__ENABLED: ${FREQTRADE__TELEGRAM__ENABLED:-false}
      FREQTRADE__TELEGRAM__TOKEN: ${FREQTRADE__TELEGRAM__TOKEN:-}
      FREQTRADE__TELEGRAM__CHAT_ID: ${FREQTRADE__TELEGRAM__CHAT_ID:-}
      FREQTRADE__API_SERVER__USERNAME: ${ETH_FREQTRADE__API_SERVER__USERNAME:-freqtrader_eth}
      FREQTRADE__API_SERVER__PASSWORD: ${ETH_FREQTRADE__API_SERVER__PASSWORD:-change-me-eth-local-only}
      FREQTRADE__API_SERVER__JWT_SECRET_KEY: ${ETH_FREQTRADE__API_SERVER__JWT_SECRET_KEY:-change-me-eth-jwt-secret-local-only}
      FREQTRADE__API_SERVER__WS_TOKEN: ${ETH_FREQTRADE__API_SERVER__WS_TOKEN:-change-me-eth-ws-local-only}
      KILL_SWITCH_PATH: /freqtrade/runtime/KILL_SWITCH
      PYTHONPATH: /freqtrade:/freqtrade/user_data/strategies
    volumes:
      - ./configs/eth.dryrun.json:/freqtrade/config.json:ro
      - ./user_data_eth:/freqtrade/user_data
      - ./risk_service:/freqtrade/risk_service:ro
      - ./runtime:/freqtrade/runtime
    ports:
      - "127.0.0.1:8082:8080"
    command: >
      trade
      --config /freqtrade/config.json
      --userdir /freqtrade/user_data
      --strategy EthHedgeStrategy
      --db-url sqlite:////freqtrade/user_data/tradesv3.dryrun.sqlite
      --logfile /freqtrade/user_data/logs/freqtrade.log

  freqtrade-sol:
    image: freqtradeorg/freqtrade:stable
    container_name: quant-hedge-sol
    restart: unless-stopped
    environment:
      FREQTRADE__DRY_RUN: "true"
      FREQTRADE__EXCHANGE__NAME: ${EXCHANGE_NAME:-binance}
      FREQTRADE__EXCHANGE__KEY: ${FREQTRADE__EXCHANGE__KEY:-}
      FREQTRADE__EXCHANGE__SECRET: ${FREQTRADE__EXCHANGE__SECRET:-}
      FREQTRADE__TELEGRAM__ENABLED: ${FREQTRADE__TELEGRAM__ENABLED:-false}
      FREQTRADE__TELEGRAM__TOKEN: ${FREQTRADE__TELEGRAM__TOKEN:-}
      FREQTRADE__TELEGRAM__CHAT_ID: ${FREQTRADE__TELEGRAM__CHAT_ID:-}
      FREQTRADE__API_SERVER__USERNAME: ${SOL_FREQTRADE__API_SERVER__USERNAME:-freqtrader_sol}
      FREQTRADE__API_SERVER__PASSWORD: ${SOL_FREQTRADE__API_SERVER__PASSWORD:-change-me-sol-local-only}
      FREQTRADE__API_SERVER__JWT_SECRET_KEY: ${SOL_FREQTRADE__API_SERVER__JWT_SECRET_KEY:-change-me-sol-jwt-secret-local-only}
      FREQTRADE__API_SERVER__WS_TOKEN: ${SOL_FREQTRADE__API_SERVER__WS_TOKEN:-change-me-sol-ws-local-only}
      KILL_SWITCH_PATH: /freqtrade/runtime/KILL_SWITCH
      PYTHONPATH: /freqtrade:/freqtrade/user_data/strategies
    volumes:
      - ./configs/sol.dryrun.json:/freqtrade/config.json:ro
      - ./user_data_sol:/freqtrade/user_data
      - ./risk_service:/freqtrade/risk_service:ro
      - ./runtime:/freqtrade/runtime
    ports:
      - "127.0.0.1:8083:8080"
    command: >
      trade
      --config /freqtrade/config.json
      --userdir /freqtrade/user_data
      --strategy SolHedgeStrategy
      --db-url sqlite:////freqtrade/user_data/tradesv3.dryrun.sqlite
      --logfile /freqtrade/user_data/logs/freqtrade.log

  freqtrade-xaut:
    image: freqtradeorg/freqtrade:stable
    container_name: quant-hedge-xaut
    restart: unless-stopped
    profiles:
      - xaut-validated
    environment:
      FREQTRADE__DRY_RUN: "true"
      FREQTRADE__EXCHANGE__NAME: ${XAUT_EXCHANGE_NAME:-binance}
      FREQTRADE__EXCHANGE__KEY: ${FREQTRADE__EXCHANGE__KEY:-}
      FREQTRADE__EXCHANGE__SECRET: ${FREQTRADE__EXCHANGE__SECRET:-}
      FREQTRADE__TELEGRAM__ENABLED: ${FREQTRADE__TELEGRAM__ENABLED:-false}
      FREQTRADE__TELEGRAM__TOKEN: ${FREQTRADE__TELEGRAM__TOKEN:-}
      FREQTRADE__TELEGRAM__CHAT_ID: ${FREQTRADE__TELEGRAM__CHAT_ID:-}
      FREQTRADE__API_SERVER__USERNAME: ${XAUT_FREQTRADE__API_SERVER__USERNAME:-freqtrader_xaut}
      FREQTRADE__API_SERVER__PASSWORD: ${XAUT_FREQTRADE__API_SERVER__PASSWORD:-change-me-xaut-local-only}
      FREQTRADE__API_SERVER__JWT_SECRET_KEY: ${XAUT_FREQTRADE__API_SERVER__JWT_SECRET_KEY:-change-me-xaut-jwt-secret-local-only}
      FREQTRADE__API_SERVER__WS_TOKEN: ${XAUT_FREQTRADE__API_SERVER__WS_TOKEN:-change-me-xaut-ws-local-only}
      KILL_SWITCH_PATH: /freqtrade/runtime/KILL_SWITCH
      PYTHONPATH: /freqtrade:/freqtrade/user_data/strategies
    volumes:
      - ./configs/xaut.dryrun.json:/freqtrade/config.json:ro
      - ./user_data_xaut:/freqtrade/user_data
      - ./risk_service:/freqtrade/risk_service:ro
      - ./runtime:/freqtrade/runtime
    ports:
      - "127.0.0.1:8084:8080"
    command: >
      trade
      --config /freqtrade/config.json
      --userdir /freqtrade/user_data
      --strategy XautHedgeStrategy
      --db-url sqlite:////freqtrade/user_data/tradesv3.dryrun.sqlite
      --logfile /freqtrade/user_data/logs/freqtrade.log

  dashboard:
    image: python:3.12-slim
    container_name: quant-hedge-dashboard
    restart: unless-stopped
    environment:
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PORT: "8090"
      DASHBOARD_REQUEST_TIMEOUT: ${DASHBOARD_REQUEST_TIMEOUT:-3}
      DASHBOARD_XAUT_VALIDATION_TTL: ${DASHBOARD_XAUT_VALIDATION_TTL:-300}
      DASHBOARD_BTC_API_URL: http://freqtrade-btc:8080
      DASHBOARD_ETH_API_URL: http://freqtrade-eth:8080
      DASHBOARD_SOL_API_URL: http://freqtrade-sol:8080
      DASHBOARD_XAUT_API_URL: http://freqtrade-xaut:8080
      BTC_FREQTRADE__API_SERVER__USERNAME: ${BTC_FREQTRADE__API_SERVER__USERNAME:-freqtrader_btc}
      BTC_FREQTRADE__API_SERVER__PASSWORD: ${BTC_FREQTRADE__API_SERVER__PASSWORD:-change-me-btc-local-only}
      ETH_FREQTRADE__API_SERVER__USERNAME: ${ETH_FREQTRADE__API_SERVER__USERNAME:-freqtrader_eth}
      ETH_FREQTRADE__API_SERVER__PASSWORD: ${ETH_FREQTRADE__API_SERVER__PASSWORD:-change-me-eth-local-only}
      SOL_FREQTRADE__API_SERVER__USERNAME: ${SOL_FREQTRADE__API_SERVER__USERNAME:-freqtrader_sol}
      SOL_FREQTRADE__API_SERVER__PASSWORD: ${SOL_FREQTRADE__API_SERVER__PASSWORD:-change-me-sol-local-only}
      XAUT_FREQTRADE__API_SERVER__USERNAME: ${XAUT_FREQTRADE__API_SERVER__USERNAME:-freqtrader_xaut}
      XAUT_FREQTRADE__API_SERVER__PASSWORD: ${XAUT_FREQTRADE__API_SERVER__PASSWORD:-change-me-xaut-local-only}
      EXCHANGE_NAME: ${EXCHANGE_NAME:-binance}
      XAUT_EXCHANGE_NAME: ${XAUT_EXCHANGE_NAME:-binance}
      KILL_SWITCH_PATH: /runtime/KILL_SWITCH
    volumes:
      - ./dashboard:/app:ro
      - ./runtime:/runtime:ro
    ports:
      - "127.0.0.1:8090:8090"
    command: python /app/server.py
